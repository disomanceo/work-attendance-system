name: Smart Area Import

on:
  workflow_dispatch:
    inputs:
      force:
        description: Run outside working hours
        required: false
        default: "true"
      debugSmartAreaId:
        description: Optional Smart Area ID for sanitized attachment diagnostics
        required: false
        default: ""
      pageRange:
        description: Optional central page or range, for example 165 or 163-165
        required: false
        default: ""
  schedule:
    # Thailand time: Monday-Friday at 08:00, 09:00, 11:00
    - cron: "0 1,2,4 * * 1-5"

    # Thailand time: Monday-Friday at 14:00, 15:00, 19:00
    - cron: "0 7,8,12 * * 1-5"

    # Thailand time: Saturday-Sunday at 12:00
    - cron: "0 5 * * 0,6"

concurrency:
  group: smart-area-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMART_AREA_BASE_URL: ${{ secrets.SMART_AREA_BASE_URL }}
      SMART_AREA_USERNAME: ${{ secrets.SMART_AREA_USERNAME }}
      SMART_AREA_PASSWORD: ${{ secrets.SMART_AREA_PASSWORD }}
      WORK_ATTENDANCE_IMPORT_URL: ${{ secrets.WORK_ATTENDANCE_IMPORT_URL }}
      WORK_ATTENDANCE_IMPORT_SECRET: ${{ secrets.WORK_ATTENDANCE_IMPORT_SECRET }}
      WORK_ATTENDANCE_CALLBACK_URL: ${{ secrets.WORK_ATTENDANCE_CALLBACK_URL }}
      FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
      DEBUG_SMART_AREA_ID: ${{ github.event.inputs.debugSmartAreaId || '' }}
      SMART_AREA_PAGE_RANGE: ${{ github.event.inputs.pageRange || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright
        run: npm install --no-save playwright@1.55.0 && npx playwright install --with-deps chromium
      - name: Import Smart Area documents
        run: node scripts/smart-area-import/index.mjs
